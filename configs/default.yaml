seed: 42
device: auto

dataset:
  name: photos
  root: data/raw/photos
  metadata_filename: metadata.csv
  image_size: 224
  image_extensions: [".jpg", ".jpeg", ".png", ".bmp", ".webp"]
  train_ratio: 0.7
  val_ratio: 0.15
  batch_size: 32
  num_workers: 4
  use_weighted_sampler: false

feature:
  type: image_cnn
  in_channels: 3
  hidden_dims: [32, 64, 96]
  output_dim: 128
  dropout: 0.0
  use_cache: false
  cache_dir: data/processed/features

model:
  filter:
    input_dim: 128
    hidden_dim: 256
    output_dim: 128
    num_layers: 3
    use_vib: true
    vib_beta: 0.01
    dropout: 0.1
  task:
    hidden_dim: 256
    dropout: 0.2
  adversary:
    trunk_dim: 128
    heads:
      gender: 2
      speaker_id: 10
    dropout: 0.3

training:
  num_epochs: 100
  lr_main: 0.001
  lr_adversary: 0.0005
  lambda_privacy: 1.0
  lambda_warmup_epochs: 10
  adversary_refresh_interval: 20
  adversary_retrain_epochs: 5
  grad_clip: 1.0
  use_teacher: false
  teacher_pretrain_epochs: 30
  teacher_lr: 0.001
  distillation_alpha: 0.0
  distillation_temperature: 4.0

output:
  dir: outputs/photos_baseline
  checkpoint_dir: outputs/photos_baseline/checkpoints
  log_dir: outputs/photos_baseline/logs
  tensorboard_dir: outputs/photos_baseline/tensorboard
