_base_: ../default.yaml

dataset:
  name: cremad
  root: data/raw/cremad

feature:
  type: melspec

model:
  filter:
    input_dim: 128
    use_vib: false
  adversary:
    heads:
      gender: 2
      speaker_id: 91

output:
  dir: outputs/ablation_novib
  checkpoint_dir: outputs/ablation_novib/checkpoints
  log_dir: outputs/ablation_novib/logs
  tensorboard_dir: outputs/ablation_novib/tensorboard
