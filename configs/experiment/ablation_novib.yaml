_base_: ../default.yaml

dataset:
  name: photos
  root: data/raw/celeba

feature:
  type: image_cnn

model:
  filter:
    input_dim: 128
    use_vib: false
  adversary:
    heads:
      gender: 2
      speaker_id: 10177

output:
  dir: outputs/celeba_ablation_novib
  checkpoint_dir: outputs/celeba_ablation_novib/checkpoints
  log_dir: outputs/celeba_ablation_novib/logs
  tensorboard_dir: outputs/celeba_ablation_novib/tensorboard
