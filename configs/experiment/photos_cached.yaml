_base_: ../default.yaml

dataset:
  name: photos
  root: data/raw/photos

feature:
  type: image_cnn
  use_cache: true
  cache_dir: data/processed/features

model:
  filter:
    input_dim: 128

output:
  dir: outputs/photos_cached
  checkpoint_dir: outputs/photos_cached/checkpoints
  log_dir: outputs/photos_cached/logs
  tensorboard_dir: outputs/photos_cached/tensorboard
